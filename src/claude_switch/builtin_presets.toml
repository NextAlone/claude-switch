# builtin_presets.toml — shipped with package, never user-edited
# See ~/.claude_switch/providers.toml for user overrides

[[provider]]
name = "claude"
aliases = ["sonnet", "s"]
description = "Claude official API (Anthropic)"
category = "api"

[provider.env]
ANTHROPIC_BASE_URL = "https://api.anthropic.com/"
ANTHROPIC_MODEL = "claude-sonnet-4-5-20250929"
ANTHROPIC_DEFAULT_SONNET_MODEL = "claude-sonnet-4-5-20250929"
ANTHROPIC_DEFAULT_OPUS_MODEL = "claude-opus-4-6"
ANTHROPIC_DEFAULT_HAIKU_MODEL = "claude-haiku-4-5-20251001"
CLAUDE_CODE_SUBAGENT_MODEL = "${ANTHROPIC_MODEL}"
ANTHROPIC_AUTH_TOKEN = "${CLAUDE_API_KEY}"

